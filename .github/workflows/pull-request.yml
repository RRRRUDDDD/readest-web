name: PR checks
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: write
  pull-requests: write
jobs:
  build_web_app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: setup pnpm
        uses: pnpm/action-setup@v6

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: cache Next.js build
        uses: actions/cache@v5
        with:
          path: apps/readest-app/.next/cache
          key: nextjs-web-${{ github.sha }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            nextjs-web-${{ github.sha }}-
            nextjs-web-

      - name: install Dependencies
        working-directory: apps/readest-app
        run: |
          pnpm install && pnpm setup-vendors

      - name: run format check
        run: |
          pnpm format:check || (pnpm format && git diff && exit 1)

      - name: install playwright browsers
        working-directory: apps/readest-app
        run: npx playwright install --with-deps chromium

      - name: run web tests
        working-directory: apps/readest-app
        run: pnpm test:pr:web

      - name: run lint
        working-directory: apps/readest-app
        run: |
          pnpm lint

      - name: build the web app
        working-directory: apps/readest-app
        run: |
          pnpm build-web && pnpm check:all
